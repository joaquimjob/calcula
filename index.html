<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobcal</title>
    <style>
        body{
            background-image: linear-gradient(to right, rgb(89,21,31),rgb(100,30,255));
            text-align: center;
        }
       #c{
         background-color: silver;
         height: 450px;
         width: 300px;
         font-size: 20px;
         margin: auto;
         padding: 20px;
         border-radius: 12px;

       }

       h1{
        margin-bottom: 100px;
       }

       .b{
        color: black;
        font-size: 30px;
        height: 70px;
        width: 70px;
        border-radius: 10px;
        

       }
       .b:hover{
        background-color: azure;
        color: blue ;
       }
       #resultado{
        color: black;
        height: 20px;
        width: 300px;
        background-color: white;
        text-align: right;
        border-radius: 5px;
        padding-top: 20px;
        
       }
     
    #j{
        color: black;
        font-size: 20px;
        height: 70px;
        width: 70px;
        border-radius: 10px;

        
    }

    #j:hover{
        background-color: azure;
        color: blue ;
    }
     
     
   </style>

</head>
<body id="ja">
    <h1 id="texto">seja bem vindo ao Kimcal</h1>
    <main class="pri">
      <main id="c">
       
           <p id="resultado" placeholder="escreva uma operação aqui"></p>
       
        <table>
        <tr>
            <td><button class="b"  onclick="clean()">c</button></td>
            <td><button class="b" onclick="back()">⌫</button></td>
            <td><button class="b" onclick="insert(`/`)">/</button></td>
            <td><button class="b" onclick="insert(`*`)">*</button></td>
        </tr>

       
        <tr>
            <td><button class="b" onclick="insert(`7`)">7</button></td>
            <td><button class="b" onclick="insert(`8`)">8</button></td>
            <td><button class="b" onclick="insert(`9`)">9</button></td>
            <td><button class="b" onclick="insert(`-`)">-</button></td>
        </tr>
       
        
        <tr>
            <td><button class="b" onclick="insert(`4`)">4</button></td>
            <td><button class="b" onclick="insert(`5`)">5</button></td>
            <td><button class="b" onclick="insert(`6`)">6</button></td>
            <td><button class="b" onclick="insert(`+`)">+</button></td>
        </tr>
         
        
        <tr>
            <td><button class="b" onclick="insert(`3`)">3</button></td>
            <td><button class="b" onclick="insert(`2`)">2</button></td>
            <td><button class="b" onclick="insert(`1`)">1</button></td>
            <td><button  class="b" onclick="ig()" >=</button></td>
        </tr>
    

        <tr>
            <td><button class="b" onclick="insert(`0`)">0</button></td>
            <td><button  class="b" onclick="insert(`.`)">.</button></td>
            <td><button class="b" onclick="boasvindas()">Clic</button></td>
            <td><a href=""><button id="j" onclick="t()">site</button></a></td>

        </tr>
       
           
        </table>

      </main>
      

      

    </main>
    <script>
     function insert(num){
        let numero = document.getElementById(`resultado`).innerHTML;
        document.getElementById(`resultado`).innerHTML = numero+num;
     }
      
     function clean(){
        document.getElementById(`resultado`).innerHTML = "";

     }

     function back(){
        let numero = document.getElementById(`resultado`).innerHTML ;
        document.getElementById(`resultado`).innerHTML = numero.substring(0,numero.length -1);
     }
      
     function ig(){
        let i = window.document.getElementById(`resultado`).innerHTML;  
          document.getElementById(`resultado`).innerHTML = eval(i); 
        
    
     }

     function boasvindas(){
        let v = prompt("Por favor escreve o seu nome nesse bloco")
      let vinda = document.getElementById(`texto`).innerHTML = ( v + " Seja bem vindo ao Kimcal ") 

     }
      
    
    
     
    </script>
 
</body>
</html>
